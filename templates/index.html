<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Mood, Chat, and Prediction Interface -->
        <div class="mood-chat-prediction-container">
            <div class="mood-container">
                <!-- Mood Analysis Section -->
                <div class="mood-section">
                    <h2>Mood Analysis</h2>
                    <div id="mood-result" style="border: 1px solid #ccc; padding: 10px;"></div>
                </div>
            
                <!-- Grammar Check Section -->
                <div class="grammar-section">
                    <h2>Grammar Check</h2>
                    <div id="grammarbox"></div>
                </div>
            </div>

            <!-- Chat Section -->
            <div class="chat-container">
                <h1 class="chat-title">French Chatbot</h1>
                <div id="chatbox"></div>
                <div class="input-area">
                    <textarea id="userInput" placeholder="Enter your message..."></textarea>
                    <div id="suggestion-box" style="display: none; position: absolute; background-color: #f8f9fa; border: 1px solid #ccc; padding: 8px; border-radius: 5px; z-index: 1000;">
                        <!-- Suggested correction will appear here -->
                      </div>                      
                    <button id="sendButton">Send</button>
                </div>
            </div>

            <!-- Prediction Section -->
            <div class="prediction-container">
                <h2>Suggested Sentences</h2>
                <div id="suggestions"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
